name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: rahul-jha98/github-stats-transparent@main
        with:
          username: ${{ github.repository_owner }}
          env_GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          env_GITHUB_TOKEN2: ${{ secrets.ACCESS_TOKEN }}
          commit_message: "Update stats"
